    <script>
    // Automatikusan legeneráljuk a tehénkét ikonnak, mikor betölt az oldal
    window.addEventListener('DOMContentLoaded', () => {
        const canvas = document.createElement('canvas');
        canvas.width = 192;
        canvas.height = 192;
        const ctx = canvas.getContext('2d');
// Létrehozzuk a láthatatlan linket a telefonnak, amit a manifest olvas be
        const favicon = document.createElement('link');
        favicon.rel = 'icon';
        favicon.type = 'image/png';
        favicon.href = canvas.toDataURL('image/png');
        document.head.appendChild(favicon);
        
        // Ez kell a manifest.json-nek apple és android eszközökön is
        const appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        appleIcon.href = canvas.toDataURL('image/png');
        document.head.appendChild(appleIcon);
    });
</script>
