<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Ugrimuu</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header id="topBar">

    <h1>🐄 UGRIMUU</h1>

    <div id="progressContainer">

        <div id="progressTrack">
            <div id="progressFill"></div>
            <div id="progressCow">🐄</div>
        </div>

    </div>

    <div id="gameInfo">

        <span id="zoneName">
            Farm
        </span>

        <span id="distanceLeft">
            Hátralévő út: 7500 m
        </span>

    </div>

</header>


<main id="gameArea">

    <div id="overlay">

        <h2 id="overlayTitle">
            UGRIMUU
        </h2>

        <p id="overlayText">

            Menekülj az UFO elől, és juss el a rendőrségig!

        </p>

        <button id="startButton">

            JÁTÉK INDÍTÁSA

        </button>

    </div>

    <canvas
        id="gameCanvas"
        width="960"
        height="540">
    </canvas>

</main>


<footer id="controls">

    <button id="runButton">

        FUTÁS

    </button>

    <button id="jumpButton">

        UGRÁS

    </button>

</footer>


<script src="player.js"></script>

<script src="ufo.js"></script>

<script src="world.js"></script>

<script src="obstacles.js"></script>

<script src="render.js"></script>

<script src="ui.js"></script>

<script src="game.js"></script>

</body>
</html>
