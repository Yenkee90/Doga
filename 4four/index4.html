<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Tehén Futam - UFO Invázió</title>
    <style>
        body, html { background: #050510; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; height: 100vh; }
        h1 { font-size: 24px; margin: 5px 0; color: #ffcc00; }
        #game-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        #gameCanvas { background: #0a0a1a; border: 2px solid #333; display: block; width: 100%; height: auto; aspect-ratio: 2 / 1; }
        #controls { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .btn { padding: 18px 40px; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #left-btn { background: #4444ff; border-bottom: 4px solid #2222b3; }
        #left-btn:active { background: #2222b3; }
        #right-btn { background: #ff4444; border-bottom: 4px solid #b32222; }
        #right-btn:active { background: #b32222; }
        #start-btn { background: #ffcc00; color: black; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 5px; margin-bottom: 10px; cursor: pointer; }
        #screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
    </style>
</head>
<body>

    <h1>TEHÉN FUTAM</h1>
    <div id="ui" style="font-weight: bold; margin-bottom: 5px; font-size: 16px;">Zóna: Csűr | Hátralévő táv: 5:00</div>
    
    <button id="start-btn" style="display:none;">ÚJRAINDÍTÁS</button>

    <div id="game-container">
        <div id="screen-overlay">
            <h1 id="overlay-title" style="color: #ff3333;">JÁTÉK VÉGE</h1>
            <p id="overlay-desc" style="margin-bottom: 15px;">Az UFO elkapott!</p>
            <button id="start-btn-overlay" style="background:#ffcc00; border:none; padding:10px 20px; font-weight:bold; border-radius:5px; cursor:pointer;">ÚJRAINDÍTÁS</button>
        </div>
        <canvas id="gameCanvas" width="600" height="300"></canvas>
    </div>

    <div id="controls">
        <button id="left-btn" class="btn">FUTÁS</button>
        <button id="right-btn" class="btn">UGRÁS</button>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const leftBtn = document.getElementById("left-btn");
const rightBtn = document.getElementById("right-btn");
const startBtn = document.getElementById("start-btn");
const startBtnOverlay = document.getElementById("start-btn-overlay");
const overlay = document.getElementById("screen-overlay");
const overlayTitle = document.getElementById("overlay-title");
const overlayDesc = document.getElementById("overlay-desc");
const uiDiv = document.getElementById("ui");

let gameState = "PLAYING"; 
let gameTime = 300; 
let timerInterval;
let keys = { run: false, jump: false };

let playerX = 50, playerY = 220, playerVy = 0, playerSpeed = 0, isGrounded = true;
let cameraX = 0, ufoScreenX = -150, ufoActive = false, abductionTimer = 0;
let obstacles = [];
let backgroundStars = [];

const FAZISOK = {
    FARM: { title: "TANYA PÁLYA", bg: "#0d0d26" },
    FOREST: { title: "ERDŐ PÁLYA", bg: "#031403" },
    TOWN: { title: "KISVÁROS PÁLYA", bg: "#111125" }
};

function generateStars() {
    backgroundStars = [];
    for(let i=0; i<40; i++) {
        backgroundStars.push({ x: Math.random() * 600, y: Math.random() * 120, r: Math.random() * 1.5 });
    }
}

startBtn.addEventListener("click", startGame);
startBtnOverlay.addEventListener("click", startGame);

leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.run = true; });
leftBtn.addEventListener("touchend", (e) => { e.preventDefault(); keys.run = false; });
leftBtn.addEventListener("mousedown", () => { keys.run = true; });
leftBtn.addEventListener("mouseup", () => { keys.run = false; });

rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.jump = true; });
rightBtn.addEventListener("touchend", (e) => { e.preventDefault(); keys.jump = false; });
rightBtn.addEventListener("mousedown", () => { keys.jump = true; });
rightBtn.addEventListener("mouseup", () => { keys.jump = false; });

function startGame() {
    overlay.style.display = "none";
    gameState = "PLAYING";
    gameTime = 300;
    playerX = 50; playerY = 220; playerVy = 0; playerSpeed = 0;
    cameraX = 0; ufoScreenX = -150; ufoActive = false; abductionTimer = 0;
    obstacles = [];
    generateStars();
    startBtn.style.display = "none";
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (gameState === "PLAYING") {
            gameTime--;
            if (gameTime <= 0) endGame("WIN");
        }
    }, 1000);
}

function endGame(status) {
    gameState = "MENU";
    clearInterval(timerInterval);
    overlay.style.display = "flex";
    if (status === "WIN") {
        overlayTitle.innerHTML = "GYŐZELEM!"; overlayTitle.style.color = "#33ff33";
        overlayDesc.innerText = "Sikeresen bemenekültél a rendőrségre!";
    } else {
        overlayTitle.innerHTML = "JÁTÉK VÉGE"; overlayTitle.style.color = "#ff3333";
        overlayDesc.innerText = "Az UFO beszippantotta a tehenet!";
    }
}

function getCurrentPhase() {
    if (gameTime > 180) return "FARM";    
    if (gameTime > 120) return "FOREST";  
    return "TOWN";                        
}

function updatePhysics() {
    if (keys.run) playerSpeed = Math.min(playerSpeed + 0.15, 4.5);
    else playerSpeed = Math.max(playerSpeed - 0.1, 0);
    playerX += playerSpeed;

    if (keys.jump && isGrounded) { playerVy = -10; isGrounded = false; }
    playerVy += 0.5; playerY += playerVy;

    if (playerY >= 220) { playerY = 220; playerVy = 0; isGrounded = true; }
    if (playerX >= 250) { cameraX = playerX - 250; ufoActive = true; }

    if (ufoActive) {
        let playerScreenX = playerX - cameraX;
        let ufoTargetX = playerSpeed > 3.5 ? -150 : playerScreenX - 20;
        ufoScreenX += (ufoTargetX - ufoScreenX) * 0.05; 
        
        if (playerScreenX > ufoScreenX - 10 && playerScreenX < ufoScreenX + 90 && ufoScreenX > 0) {
            abductionTimer++;
            if (abductionTimer >= 245) endGame("GAMEOVER");
        } else {
            abductionTimer = Math.max(abductionTimer - 2, 0);
        }
    }

    if (Math.random() < 0.007 && obstacles.length < 3) {
        let phase = getCurrentPhase();
        let types = [];
        if (phase === "FARM") types = ["bale", "fence"];
        else if (phase === "FOREST") types = ["log", "bush"];
        else types = ["hydrant", "box"];
        let finalType = types[Math.floor(Math.random() * types.length)];
        
        // Különböző méretek az akadályoknak kockák helyett
        let w = 25, h = 25;
        if (finalType === "fence") { w = 35; h = 25; }
        if (finalType === "log") { w = 40; h = 18; }
        if (finalType === "bush") { w = 35; h = 30; }
        
        obstacles.push({ x: playerX + 450 + Math.random() * 200, type: finalType, w: w, h: h });
    }

    obstacles.forEach((obs, index) => {
        if (playerX + 40 > obs.x && playerX < obs.x + obs.w && playerY + 30 > (250 - obs.h)) {
            playerSpeed = 0.5; 
        }
        if (obs.x < cameraX - 50) obstacles.splice(index, 1);
    });
}

function drawEnvironment() {
    let phase = getCurrentPhase();
    ctx.fillStyle = FAZISOK[phase].bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Csillagok (Háttér)
    ctx.fillStyle = "#ffffff";
    backgroundStars.forEach(star => {
        let sx = (star.x - cameraX * 0.1) % canvas.width;
        if (sx < 0) sx += canvas.width;
        ctx.fillRect(sx, star.y, star.r, star.r);
    });

    // 🌳 DINAMIKUS HÁTTÉRKÉPEK FÁZISONKÉNT (Parallax követéssel)
    if (phase === "FARM") {
        ctx.fillStyle = "#060612"; // Hegyek sziluettje a tanyán
        ctx.beginPath(); ctx.moveTo(0, 250);
        for(let i=0; i<=canvas.width; i+=60) { ctx.lineTo(i, 200 + (Math.sin(i + cameraX*0.05)*15)); }
        ctx.lineTo(canvas.width, 250); ctx.fill();
    } 
    else if (phase === "FOREST") {
        ctx.fillStyle = "#022002"; // Erdei fenyőfák a háttérben
        for (let i = -50; i < canvas.width + 50; i += 40) {
            let fx = (i - (cameraX * 0.3)) % (canvas.width + 100);
            if (fx < -50) fx += (canvas.width + 100);
            ctx.beginPath();
            ctx.moveTo(fx, 250); ctx.lineTo(fx + 20, 160); ctx.lineTo(fx + 40, 250);
            ctx.closePath(); ctx.fill();
        }
    } 
    else if (phase === "TOWN") {
        ctx.fillStyle = "#0d0d1a"; // Városi épületek sziluettje ablakokkal
        for (let i = -100; i < canvas.width + 100; i += 70) {
            let hx = (i - (cameraX * 0.2)) % (canvas.width + 200);
            if (hx < -100) hx += (canvas.width + 200);
            let hH = 110 + (i % 3 * 20);
            ctx.fillRect(hx, 250 - hH, 60, hH);
            // Sárga ablakok rajzolása az épületekre
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(hx + 15, 250 - hH + 20, 8, 12);
            ctx.fillRect(hx + 35, 250 - hH + 40, 8, 12);
            ctx.fillStyle = "#0d0d1a";
        }
    }

    // Talaj
    ctx.fillStyle = phase === "TOWN" ? "#252528" : "#142914";
    ctx.fillRect(0, 250, canvas.width, 50);
    ctx.fillStyle = phase === "TOWN" ? "#444" : "#0f1f0f"; // Útpadka vonal
    ctx.fillRect(0, 250, canvas.width, 4);
}

function drawObstacles() {
    obstacles.forEach(obs => {
        ctx.save();
        ctx.translate(obs.x, 250 - obs.h);
        
        if (obs.type === "bale") { // Szalmabála textúrával
                        ctx.fillStyle = "#cca125"; ctx.fillRect(0, 0, obs.w, obs.h);
            ctx.strokeStyle = "#997311"; ctx.lineWidth = 2;
            ctx.strokeRect(3, 3, obs.w-6, obs.h-6);
        } 
        else if (obs.type === "fence") { // Kerítés lécekkel
            ctx.fillStyle = "#7a5230";
            ctx.fillRect(0, 4, obs.w, 4); ctx.fillRect(0, obs.h-8, obs.w, 4);
            for(let l=2; l<obs.w; l+=8) ctx.fillRect(l, 0, 4, obs.h);
        } 
        else if (obs.type === "log") { // Farönk évgyűrűvel
            ctx.fillStyle = "#5c3a21"; ctx.fillRect(0, 0, obs.w, obs.h);
            ctx.fillStyle = "#d1a17b"; ctx.beginPath(); ctx.arc(obs.w, obs.h/2, obs.h/2, 0, Math.PI*2); ctx.fill();
        } 
        else if (obs.type === "bush") { // Csipkés zöld bokor
            ctx.fillStyle = "#1e5c1e";
            ctx.beginPath(); ctx.arc(10, 15, 12, 0, Math.PI*2); ctx.arc(25, 12, 14, 0, Math.PI*2); ctx.arc(18, 22, 12, 0, Math.PI*2); ctx.fill();
        } 
        else if (obs.type === "hydrant") { // Arcade Tűzcsap
            ctx.fillStyle = "#d62424";
            ctx.fillRect(6, 0, obs.w-12, obs.h); ctx.fillRect(2, 6, obs.w-4, 6);
            ctx.fillStyle = "#ffaa00"; ctx.fillRect(10, 2, 5, 4);
        } 
        else if (obs.type === "box") { // Kartondoboz ragasztószalaggal
            ctx.fillStyle = "#b58750"; ctx.fillRect(0, 0, obs.w, obs.h);
            ctx.fillStyle = "#8a6132"; ctx.fillRect(0, 0, obs.w, 4); ctx.fillRect(obs.w/2-2, 0, 4, obs.h);
        }
        ctx.restore();
    });
}

function draw() {
    drawEnvironment();

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Csűr
    ctx.fillStyle = "#5a1a1a"; ctx.fillRect(-100, 100, 200, 150);
    ctx.fillStyle = "#000"; ctx.fillRect(0, 150, 60, 100);
    ctx.fillStyle = "#3a1010"; ctx.beginPath(); ctx.moveTo(-110, 100); ctx.lineTo(0, 50); ctx.lineTo(110, 100); ctx.fill(); // Tető

    // Rendőrség a legvégén
    if (gameTime < 10) {
        ctx.fillStyle = "#223355"; ctx.fillRect(playerX + 300, 80, 200, 170);
        ctx.fillStyle = "#000000"; ctx.fillRect(playerX + 360, 150, 70, 100);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 16px sans-serif"; ctx.fillText("POLICE", playerX + 370, 110);
        ctx.fillStyle = (Math.floor(Date.now() / 200) % 2 === 0) ? "#00f" : "#f00";
        ctx.beginPath(); ctx.arc(playerX + 400, 70, 8, 0, Math.PI*2); ctx.fill(); // Villogó
    }

    drawObstacles();

    // Tehén rajzolása
    ctx.fillStyle = "#ffffff"; ctx.fillRect(playerX, playerY, 45, 30);
    ctx.fillStyle = "#000000"; ctx.fillRect(playerX + 10, playerY + 5, 10, 10); ctx.fillRect(playerX + 25, playerY + 12, 8, 8);
    ctx.fillStyle = "#ffffff"; ctx.fillRect(playerX + 35, playerY - 5, 12, 15);
    ctx.fillStyle = "#ffb6c1"; ctx.fillRect(playerX + 42, playerY, 5, 8);
    ctx.fillStyle = "#ffffff";
    let legOffset = (Math.sin(Date.now() * 0.01 * playerSpeed)) * 5;
    if(playerSpeed === 0) legOffset = 0;
    ctx.fillRect(playerX + 5, playerY + 30, 6, 10 + legOffset); ctx.fillRect(playerX + 15, playerY + 30, 6, 10 - legOffset);
    ctx.fillRect(playerX + 25, playerY + 30, 6, 10 + legOffset); ctx.fillRect(playerX + 35, playerY + 30, 6, 10 - legOffset);

    ctx.restore();

    // UFO sárga sugárral
    if (ufoActive && ufoScreenX > -90) {
        let gradient = ctx.createLinearGradient(ufoScreenX + 40, 30, ufoScreenX + 40, 250);
        gradient.addColorStop(0, 'rgba(255, 230, 0, 0.5)'); gradient.addColorStop(1, 'rgba(255, 230, 0, 0.0)');
        ctx.fillStyle = gradient; ctx.beginPath();
        ctx.moveTo(ufoScreenX + 20, 30); ctx.lineTo(ufoScreenX + 60, 30); ctx.lineTo(ufoScreenX + 80, 250); ctx.lineTo(ufoScreenX - 0, 250);
        ctx.closePath(); ctx.fill();

        ctx.fillStyle = "#888899"; ctx.beginPath(); ctx.ellipse(ufoScreenX + 40, 25, 40, 13, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(ufoScreenX + 40, 20, 14, Math.PI, 0); ctx.fill();
    }

    let phase = getCurrentPhase();
    let m = Math.floor(gameTime / 60); let s = gameTime % 60;
    uiDiv.innerText = `Zóna: ${FAZISOK[phase].title} | Hátralévő táv: ${m}:${s < 10 ? '0' : ''}${s} ${abductionTimer > 0 ? '⚠️ UFO VESZÉLY!' : ''}`;
}

function loop() {
    if (gameState === "PLAYING") updatePhysics();
    draw();
    requestAnimationFrame(loop);
}

generateStars();
startGame(); 
loop();
</script>
</body>
</html>
