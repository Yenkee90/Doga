<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Idősáv</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-idosav">

  <div id="timeline-editor">
    <div id="active-year">2026</div>

    <div id="editor-area"></div>
  </div>

  <div class="bottom-bar">

    <button onclick="jumpYear()">Ugrás</button>

    <button onclick="zoom()">Nagyítás</button>

    <button class="main-btn" onclick="openEditor()">
      Bejegyzés
    </button>

  </div>

  <!-- FULLSCREEN EDITOR -->
  <div id="editor" class="editor hidden">

    <textarea id="text"></textarea>

    <div class="editor-top">
      <button onclick="saveState()">Helyzet mentése</button>
      <button onclick="goBack()">Kilépés</button>
    </div>

    <div class="editor-bottom">
      <button onclick="saveEntry()">Elfogadás</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
