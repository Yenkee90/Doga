<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Tehén Futam - UFO Invázió</title>
    <style>
        body, html { background: #050510; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; height: 100vh; }
        h1 { font-size: 24px; margin: 5px 0; color: #ffcc00; }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Ugyanaz a biztosan megjelenő méretezés, mint az egyszerűsítettnél */
        #gameCanvas {
            background: #0a0a1a;
            border: 2px solid #333;
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 2 / 1;
        }

        #controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
        }

        /* Visszahoztam a neked tetsző szép, nagy kör alakú gombokat */
        .touch-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 2px 4px black;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.5); }

        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #start-btn {
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            background: #ffcc00; color: #000; border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>TEHÉN FUTAM</h1>
    <div id="ui" style="font-weight: bold; margin-bottom: 5px; font-size: 16px;">Zóna: Csűr | Hátralévő táv: 5:00</div>

    <div id="game-container">
        <div id="screen-overlay">
            <h1 id="overlay-title" style="color: #ff3333;">JÁTÉK VÉGE</h1>
            <p id="overlay-desc" style="margin-bottom: 15px;">Az UFO elkapott!</p>
            <button id="start-btn">ÚJRAINDÍTÁS</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <div id="controls">
        <div id="left-btn" class="touch-btn">FUTÁS</div>
        <div id="right-btn" class="touch-btn">UGRÁS</div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const leftBtn = document.getElementById("left-btn");
const rightBtn = document.getElementById("right-btn");
const startBtn = document.getElementById("start-btn");
const overlay = document.getElementById("screen-overlay");
const overlayTitle = document.getElementById("overlay-title");
const overlayDesc = document.getElementById("overlay-desc");
const uiDiv = document.getElementById("ui");

let gameState = "PLAYING"; 
let gameTime = 300; 
let timerInterval;
let keys = { run: false, jump: false };

let playerX = 50, playerY = 300, playerVy = 0, playerSpeed = 0, isGrounded = true;
let cameraX = 0, ufoX = 0, ufoActive = false, abductionTimer = 0;
let obstacles = [];
let backgroundStars = [];

const FAZISOK = {
    FARM: { title: "TANYA PÁLYA", bg: "#0d0d26" },
    FOREST: { title: "ERDŐ PÁLYA", bg: "#051a05" },
    TOWN: { title: "KISVÁROS PÁLYA", bg: "#1a1a2e" }
};

function generateStars() {
    backgroundStars = [];
    for(let i=0; i<60; i++) {
        backgroundStars.push({ x: Math.random() * 800, y: Math.random() * 180, r: Math.random() * 2 });
    }
}

// Biztos mobil érintéskezelők (ugyanaz, mint ami az egyszerűnél működött)
leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.run = true; });
leftBtn.addEventListener("touchend", (e) => { e.preventDefault(); keys.run = false; });
leftBtn.addEventListener("mousedown", () => { keys.run = true; });
leftBtn.addEventListener("mouseup", () => { keys.run = false; });

rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.jump = true; });
rightBtn.addEventListener("touchend", (e) => { e.preventDefault(); keys.jump = false; });
rightBtn.addEventListener("mousedown", () => { keys.jump = true; });
rightBtn.addEventListener("mouseup", () => { keys.jump = false; });

startBtn.addEventListener("click", startGame);
startBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startGame(); });

function startGame() {
    overlay.style.display = "none";
    gameState = "PLAYING";
    gameTime = 300;
    playerX = 50; playerY = 300; playerVy = 0; playerSpeed = 0;
    cameraX = 0; ufoX = 0; ufoActive = false; abductionTimer = 0;
    obstacles = [];
    generateStars();
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (gameState === "PLAYING") {
            gameTime--;
            if (gameTime <= 0) endGame("WIN");
        }
    }, 1000);
}

function endGame(status) {
    gameState = "MENU";
    clearInterval(timerInterval);
    overlay.style.display = "flex";

    if (status === "GAMEOVER") {
        overlayTitle.innerHTML = "JÁTÉK VÉGE";
        overlayTitle.style.color = "#ff3333";
        overlayDesc.innerText = "Az UFO beszippantotta a tehenet a sárga sugárral!";
        startBtn.innerText = "ÚJRAINDÍTÁS";
    } else if (status === "WIN") {
        overlayTitle.innerHTML = "GYŐZELEM!";
        overlayTitle.style.color = "#33ff33";
        overlayDesc.innerText = "Sikeresen bemenekültél a rendőrségre!";
        startBtn.innerText = "JÁTÉK ÚJRA";
    }
}

function getCurrentPhase() {
    if (gameTime > 180) return "FARM";    
    if (gameTime > 120) return "FOREST";  
    return "TOWN";                        
}

function updatePhysics() {
    if (keys.run) playerSpeed = Math.min(playerSpeed + 0.2, 5);
    else playerSpeed = Math.max(playerSpeed - 0.1, 0);
    playerX += playerSpeed;

    if (keys.jump && isGrounded) {
        playerVy = -12;
        isGrounded = false;
    }
    playerVy += 0.6; 
    playerY += playerVy;

    if (playerY >= 300) {
        playerY = 300;
        playerVy = 0;
        isGrounded = true;
    }

    if (playerX >= 400) {
        cameraX = playerX - 400;
        ufoActive = true;
    }

    if (ufoActive) {
        ufoX += ((playerX - cameraX) - 20 - ufoX) * 0.035; // Lassú UFO követés
        
        if (playerX - cameraX > ufoX - 10 && playerX - cameraX < ufoX + 110) {
            abductionTimer++;
            if (abductionTimer >= 180) endGame("GAMEOVER");
        } else {
            abductionTimer = Math.max(abductionTimer - 2, 0);
        }
    }

    if (Math.random() < 0.008 && obstacles.length < 3) {
        obstacles.push({ x: playerX + 600 + Math.random() * 200, type: getCurrentPhase() });
    }

    obstacles.forEach((obs, index) => {
        if (playerX + 45 > obs.x && playerX < obs.x + 30 && playerY + 40 > 310) {
            playerSpeed = 0.5; 
        }
        if (obs.x < cameraX - 50) obstacles.splice(index, 1);
    });
}

function draw() {
    let phase = getCurrentPhase();
    ctx.fillStyle = FAZISOK[phase].bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Csillagok
    ctx.fillStyle = "#ffffff";
    backgroundStars.forEach(star => {
        let sx = (star.x - cameraX * 0.2) % canvas.width;
        if (sx < 0) sx += canvas.width;
        ctx.fillRect(sx, star.y, star.r, star.r);
    });

    // Dombok
    ctx.fillStyle = "#050515";
    ctx.beginPath(); ctx.moveTo(0, 340);
    for(let i=0; i<=canvas.width; i+=100) { ctx.lineTo(i, (i % 300 === 0) ? 240 : 270); }
    ctx.lineTo(canvas.width, 340); ctx.fill();

    // Talaj
    ctx.fillStyle = phase === "TOWN" ? "#222225" : "#112211";
    ctx.fillRect(0, 340, canvas.width, 60);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Csűr
    ctx.fillStyle = "#5a1a1a"; ctx.fillRect(-100, 140, 200, 200);
    ctx.fillStyle = "#000"; ctx.fillRect(0, 200, 80, 140);

    // Rendőrség a legvégén
    if (gameTime < 10) {
        ctx.fillStyle = "#223355"; ctx.fillRect(playerX + 400, 120, 250, 220);
        ctx.fillStyle = "#000000"; ctx.fillRect(playerX + 480, 200, 90, 140);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 20px sans-serif"; ctx.fillText("POLICE", playerX + 490, 160);
    }

    // Akadályok
    obstacles.forEach(obs => {
        if (obs.type === "FARM") ctx.fillStyle = "#997722";
        else if (obs.type === "FOREST") ctx.fillStyle = "#553311";
        else ctx.fillStyle = "#cc2222";
        ctx.fillRect(obs.x, 310, 30, 30);
    });

    // Szép grafikus tehén foltokkal és orral
    ctx.fillStyle = "#ffffff"; ctx.fillRect(playerX, playerY, 45, 30);
    ctx.fillStyle = "#000000"; ctx.fillRect(playerX + 10, playerY + 5, 10, 10); ctx.fillRect(playerX + 25, playerY + 12, 8, 8);
    ctx.fillStyle = "#ffffff"; ctx.fillRect(playerX + 35, playerY - 5, 12, 15);
    ctx.fillStyle = "#ffb6c1"; ctx.fillRect(playerX + 42, playerY, 5, 8);
    ctx.fillStyle = "#ffffff";
    let legOffset = (Math.sin(Date.now() * 0.01 * playerSpeed)) * 5;
    if(playerSpeed === 0) legOffset = 0;
    ctx.fillRect(playerX + 5, playerY + 30, 6, 10 + legOffset); ctx.fillRect(playerX + 15, playerY + 30, 6, 10 - legOffset);
    ctx.fillRect(playerX + 25, playerY + 30, 6, 10 + legOffset); ctx.fillRect(playerX + 35, playerY + 30, 6, 10 - legOffset);

    ctx.restore();

    // Szép UFO sárga sugárral
    if (ufoActive) {
