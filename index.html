<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Tehén Futam - UFO Invázió</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: sans-serif; }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 2 / 1;
        }

        .touch-btn {
            position: absolute;
            bottom: 8%;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 1px 3px black;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.6); }
        #left-btn { left: 4%; }
        #right-btn { right: 4%; }

        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 2px 4px #000;
        }

        #abduction-bar-container {
            width: 180px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffaa00;
            margin-top: 5px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }
        #abduction-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.1s; }

        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }
        #screen-overlay h1 { font-size: 32px; color: #ffcc00; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        #screen-overlay p { font-size: 15px; margin-bottom: 20px; max-width: 500px; line-height: 1.4; }
        #start-btn {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: #ffcc00; color: #000; border: none; border-radius: 5px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255,204,0,0.4);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-overlay">
            <div id="zone-text">ZÓNA: CSŰR</div>
            <div id="time-text">Hátralévő táv: 5:00</div>
            <div id="abduction-bar-container">
                <div style="font-size: 11px; margin-bottom: 2px;">UFO ELRABLÁS VESZÉLY!</div>
                <div id="abduction-bar"></div>
            </div>
        </div>

        <div id="screen-overlay">
            <h1 id="overlay-title">TEHÉN FUTAM</h1>
            <p id="overlay-desc">Fuss el a Csűrből egészen a Rendőrségig az éjszakán át! Kerüld el a tanyasi, erdei és városi akadályokat, és ne hagyd, hogy az UFO sugara 3 másodpercnél tovább magával ragadjon!</p>
            <button id="start-btn">JÁTÉK INDÍTÁSA</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="left-btn" class="touch-btn">FUTÁS</div>
        <div id="right-btn" class="touch-btn">UGRÁS</div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const leftBtn = document.getElementById("left-btn");
const rightBtn = document.getElementById("right-btn");
const uiZone = document.getElementById("zone-text");
const uiTime = document.getElementById("time-text");
const uiBarContainer = document.getElementById("abduction-bar-container");
const uiBar = document.getElementById("abduction-bar");
const overlay = document.getElementById("screen-overlay");
const overlayTitle = document.getElementById("overlay-title");
const overlayDesc = document.getElementById("overlay-desc");
const startBtn = document.getElementById("start-btn");

let gameState = "MENU"; 
let gameTime = 300; 
let timerInterval;
let keys = { run: false, jump: false };

const FAZISOK = {
    FARM: { title: "TANYA PÁLYA", bg: "#0d0d26" },
    FOREST: { title: "ERDŐ PÁLYA", bg: "#051a05" },
    TOWN: { title: "KISVÁROS PÁLYA", bg: "#1a1a2e" }
};

let player, ufo, cameraX, obstacles, backgroundStars;
let ufoActive = false;

class Cow {
    constructor() {
        this.x = 50;
        this.y = 300;
        this.width = 60;
        this.height = 40;
        this.vy = 0;
        this.gravity = 0.6;
        this.isGrounded = true;
        this.speed = 0;
        this.maxSpeed = 5;
        this.abductionTimer = 0; 
    }

    update() {
        if (keys.run) {
            this.speed = Math.min(this.speed + 0.2, this.maxSpeed);
        } else {
            this.speed = Math.max(this.speed - 0.1, 0);
        }
        this.x += this.speed;

        if (keys.jump && this.isGrounded) {
            this.vy = -12;
            this.isGrounded = false;
        }

        this.vy += this.gravity;
        this.y += this.vy;

        if (this.y >= 300) {
            this.y = 300;
            this.vy = 0;
            this.isGrounded = true;
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 5, this.width - 15, this.height - 15); 
        ctx.fillStyle = "#000000";
        ctx.fillRect(10, 10, 12, 12);
        ctx.fillRect(25, 18, 10, 10);
        ctx.fillRect(5, 20, 8, 8);
        ctx.fillStyle = "#ffffff";
        let legOffset = (Math.sin(Date.now() * 0.01 * this.speed)) * 5;
        if(this.speed === 0) legOffset = 0;
        ctx.fillRect(5, this.height - 10, 6, 10 + legOffset);
        ctx.fillRect(15, this.height - 10, 6, 10 - legOffset);
        ctx.fillRect(30, this.height - 10, 6, 10 + legOffset);
        ctx.fillRect(40, this.height - 10, 6, 10 - legOffset);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(this.width - 15, 0, 15, 18);
        ctx.fillStyle = "#000000"; 
        ctx.fillRect(this.width - 10, 0, 8, 6);
        ctx.fillStyle = "#ffb6c1"; 
        ctx.fillRect(this.width - 5, 8, 5, 10);
        ctx.restore();
    }
}

class UFO {
    constructor() {
        this.x = 0;
        this.y = 40;
        this.width = 100;
        this.height = 35;
    }

    update(targetX) {
        this.x += (targetX - 20 - this.x) * 0.05;
    }

    draw() {
        if (ufoActive) {
            let gradient = ctx.createLinearGradient(this.x + 50, this.y + 20, this.x + 50, 340);
            gradient.addColorStop(0, 'rgba(255, 230, 0, 0.6)');
            gradient.addColorStop(1, 'rgba(255, 230, 0, 0.0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(this.x + 30, this.y + 20);
            ctx.lineTo(this.x + 70, this.y + 20);
            ctx.lineTo(this.x + 110, 340);
            ctx.lineTo(this.x - 10, 340);
            ctx.closePath();
            ctx.fill();
        }
        ctx.fillStyle = "#888899";
        ctx.beginPath();
        ctx.ellipse(this.x + 50, this.y + 15, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#00ffff";
        ctx.beginPath();
        ctx.arc(this.x + 50, this.y + 8, 18, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = (Math.floor(Date.now() / 200) % 2 === 0) ? "#ff0000" : "#00ff00";
        for (let i = 15; i < 90; i += 20) {
            ctx.fillRect(this.x + i, this.y + 15, 4, 4);
        }
    }
}

function generateStars() {
    backgroundStars = [];
    for(let i=0; i<100; i++) {
        backgroundStars.push({ x: Math.random() * 2000, y: Math.random() * 200, r: Math.random() * 2 });
    }
}

function spawnObstacle() {
    if (gameState !== "PLAYING") return;
    let currentPhase = getCurrentPhase();
    let type = "hay";
    if (currentPhase === "FARM") type = Math.random() > 0.5 ? "hay" : "fence";
    else if (currentPhase === "FOREST") type = Math.random() > 0.5 ? "log" : "bush";
    else if (currentPhase === "TOWN") type = Math.random() > 0.5 ? "hydrant" : "box";

    let spawnX = player.x + 600 + Math.random() * 300;
    if (gameTime > 5) {
        obstacles.push({ x: spawnX, y: 310, width: 30, height: 30, type: type });
    }
    setTimeout(spawnObstacle, 1500 + Math.random() * 1500);
}

function getCurrentPhase() {
    if (gameTime > 180) return "FARM";    
    if (gameTime > 120) return "FOREST";  
    return "TOWN";                        
}

function setupInput() {
    leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.run = true; }, {passive: false});
    leftBtn.addEventListener("touchend", (e) => { e.preventDefault(); keys.run = false; }, {passive: false});
    leftBtn.addEventListener("touchcancel", (e) => { keys.run = false; });
    
    rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.jump = true; }, {passive: false});
