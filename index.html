<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Tehén Futam - UFO Invázió</title>
    <style>
        body, html { background: #050510; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        h1 { font-size: 24px; margin: 5px 0; color: #ffcc00; }
        #info { font-size: 14px; margin-bottom: 10px; color: #ccc; }
        
        /* Fix méretű, biztosan megjelenő játéktér */
        #gameCanvas {
            background: #0a0a1a;
            border: 2px solid #333;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            height: auto;
        }

        #controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Nagy, biztosan megnyomható gombok */
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #222;
            color: white;
            border: 2px solid #555;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:active { background: #555; }
        
        #start-btn {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>TEHÉN FUTAM</h1>
    <div id="info">Nyomd meg az indítás gombot, majd tartsd nyomva a FUTÁS gombot a haladáshoz!</div>
    
    <button id="start-btn">JÁTÉK INDÍTÁSA</button>

    <div id="ui" style="font-weight: bold; margin-bottom: 5px;">Zóna: Csűr | Idő: 5:00</div>

    <canvas id="gameCanvas" width="600" height="300"></canvas>

    <div id="controls">
        <button id="left-btn" class="btn">FUTÁS</button>
        <button id="right-btn" class="btn">UGRÁS</button>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const leftBtn = document.getElementById("left-btn");
const rightBtn = document.getElementById("right-btn");
const startBtn = document.getElementById("start-btn");
const uiDiv = document.getElementById("ui");

let gameState = "MENU"; 
let gameTime = 300; 
let timerInterval;
let keys = { run: false, jump: false };

let playerX = 50, playerY = 220, playerVy = 0, playerSpeed = 0, isGrounded = true;
let cameraX = 0, ufoX = 0, ufoActive = false, abductionTimer = 0;
let obstacles = [];

const FAZISOK = {
    FARM: { title: "TANYA", bg: "#0d0d26" },
    FOREST: { title: "ERDŐ", bg: "#051a05" },
    TOWN: { title: "KISVÁROS", bg: "#1a1a2e" }
};

// Egyszerűsített gombkezelők
startBtn.addEventListener("click", startGame);
startBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startGame(); });

leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.run = true; });
leftBtn.addEventListener("touchend", (e) => { e.preventDefault(); keys.run = false; });
leftBtn.addEventListener("mousedown", () => { keys.run = true; });
leftBtn.addEventListener("mouseup", () => { keys.run = false; });

rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.jump = true; });
rightBtn.addEventListener("touchend", (e) => { e.preventDefault(); keys.jump = false; });
rightBtn.addEventListener("mousedown", () => { keys.jump = true; });
rightBtn.addEventListener("mouseup", () => { keys.jump = false; });

function startGame() {
    gameState = "PLAYING";
    gameTime = 300;
    playerX = 50; playerY = 220; playerVy = 0; playerSpeed = 0;
    cameraX = 0; ufoX = 0; ufoActive = false; abductionTimer = 0;
    obstacles = [];
    startBtn.style.display = "none";
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (gameState === "PLAYING") {
            gameTime--;
            if (gameTime <= 0) endGame("WIN");
        }
    }, 1000);
}

function endGame(status) {
    gameState = "MENU";
    clearInterval(timerInterval);
    startBtn.style.display = "inline-block";
    startBtn.innerText = status === "WIN" ? "GYŐZELEM! ÚJRA?" : "JÁTÉK VÉGE! ÚJRAINDÍTÁS";
}

function getCurrentPhase() {
    if (gameTime > 180) return "FARM";    
    if (gameTime > 120) return "FOREST";  
    return "TOWN";                        
}

function updatePhysics() {
    if (keys.run) playerSpeed = Math.min(playerSpeed + 0.2, 4);
    else playerSpeed = Math.max(playerSpeed - 0.1, 0);
    playerX += playerSpeed;

    if (keys.jump && isGrounded) {
        playerVy = -10;
        isGrounded = false;
    }
    playerVy += 0.5; // gravitáció
    playerY += playerVy;

    if (playerY >= 220) {
        playerY = 220;
        playerVy = 0;
        isGrounded = true;
    }

    if (playerX >= 300) {
        cameraX = playerX - 300;
        ufoActive = true;
    }

    if (ufoActive) {
        ufoX += ((playerX - cameraX) - 20 - ufoX) * 0.05;
        
        // Sugár ütközés
        if (playerX - cameraX > ufoX - 10 && playerX - cameraX < ufoX + 90) {
            abductionTimer++;
            if (abductionTimer >= 180) endGame("LOSE");
        } else {
            abductionTimer = Math.max(abductionTimer - 1, 0);
        }
    }

    // Akadály generálás
    if (Math.random() < 0.01 && obstacles.length < 3) {
        obstacles.push({ x: playerX + 400 + Math.random() * 200, hit: false });
    }

    // Akadály ütközés és tisztítás
    obstacles.forEach((obs, index) => {
        if (playerX + 40 > obs.x && playerX < obs.x + 20 && playerY > 200) {
            playerSpeed = 0.5; // Lassulás
        }
        if (obs.x < cameraX - 50) obstacles.splice(index, 1);
    });
}

function draw() {
    let phase = getCurrentPhase();
    ctx.fillStyle = FAZISOK[phase].bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Háttér talaj
    ctx.fillStyle = phase === "TOWN" ? "#222225" : "#112211";
    ctx.fillRect(0, 250, canvas.width, 50);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Csűr az elején
    ctx.fillStyle = "#5a1a1a";
    ctx.fillRect(0, 150, 120, 100);
    ctx.fillStyle = "#000";
    ctx.fillRect(40, 180, 40, 70);

    // Akadályok
    ctx.fillStyle = "#997722";
    obstacles.forEach(obs => {
        ctx.fillRect(obs.x, 225, 20, 25);
    });

    // Tehén rajzolása
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(playerX, playerY, 45, 30);
    ctx.fillStyle = "#000000"; // Foltok
    ctx.fillRect(playerX + 10, playerY + 5, 10, 10);
    ctx.fillRect(playerX + 25, playerY + 12, 8, 8);
    ctx.fillStyle = "#ffffff"; // Fej
    ctx.fillRect(playerX + 35, playerY - 5, 12, 15);
    ctx.fillStyle = "#ffb6c1"; // Orr
    ctx.fillRect(playerX + 42, playerY, 5, 8);

    ctx.restore();

    // UFO rajzolása
    if (ufoActive) {
        // Sugár
        ctx.fillStyle = "rgba(255, 230, 0, 0.3)";
        ctx.beginPath();
        ctx.moveTo(ufoX + 20, 40); ctx.lineTo(ufoX + 60, 40);
        ctx.lineTo(ufoX + 90, 250); ctx.lineTo(ufoX - 10, 250);
        ctx.closePath(); ctx.fill();

        // Hajó
        ctx.fillStyle = "#888899";
        ctx.fillRect(ufoX, 20, 80, 20);
        ctx.fillStyle = "#00ffff";
        ctx.fillRect(ufoX + 25, 10, 30, 10);
    }

    // UI Szöveg frissítése a canvas felett
    let m = Math.floor(gameTime / 60);
    let s = gameTime % 60;
    uiDiv.innerText = `Zóna: ${FAZISOK[phase].title} | Hátralévő táv: ${m}:${s < 10 ? '0' : ''}${s} ${abductionTimer > 0 ? '⚠️ UFO VESZÉLY!' : ''}`;
}

function loop() {
    if (gameState === "PLAYING") updatePhysics();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
