<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Jelen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-jelen">

  <div class="left-panel">
    <h1 class="title">Deviáns Narratíva</h1>

    <div class="menu">
      <button>Új fejezet</button>
      <button>Visszatérés</button>
      <button>Kalibrálás</button>
      <button onclick="toggleKronikas()">Krónikás</button>
      <button>Időszilánk</button>
      <button>Távozás</button>
    </div>
  </div>

  <div class="right-panel">
    <div id="timeline">
      <!-- dinamikus -->
    </div>
  </div>

  <!-- KRÓNIKÁS -->
  <div id="kronikas" class="kronikas hidden">
    <h2>Krónikás</h2>

    <textarea id="kronikasInput" placeholder="JSON beillesztés..."></textarea>

    <button onclick="applyKronikas()">Alkalmaz</button>
    <button onclick="exportData()">Export</button>
    <button onclick="toggleKronikas()">Kilépés</button>
  </div>

  <script src="app.js"></script>
  <script src="kronikas.js"></script>
</body>
</html>
